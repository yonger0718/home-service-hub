<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home Hub · 家庭服務中樞</title>
<link rel="icon" href="../../assets/app-icon.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/primeicons@7.0.0/primeicons.css">
<link rel="stylesheet" href="kit.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
<script>
  /* apply saved appearance + gain/loss convention before paint (no flash) */
  (function () {
    if (localStorage.getItem("hh-dark") === "1") document.documentElement.classList.add("app-dark-mode");
    document.documentElement.setAttribute("data-gainloss", localStorage.getItem("hh-gainloss") || "asian");
  })();
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-finance.jsx"></script>
<script type="text/babel" src="screens-records.jsx"></script>
<script type="text/babel" src="screens-settings.jsx"></script>
<script type="text/babel" src="screens-dividends-import.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState("portfolio");
  const [dialog, setDialog] = useState(false);
  const [dark, setDark] = useState(() => localStorage.getItem("hh-dark") === "1");
  const [gainLoss, setGainLoss] = useState(() => localStorage.getItem("hh-gainloss") || "asian");
  window.__openTxnDialog = () => setDialog(true);

  useEffect(() => {
    document.documentElement.classList.toggle("app-dark-mode", dark);
    document.documentElement.setAttribute("data-gainloss", gainLoss);
    localStorage.setItem("hh-dark", dark ? "1" : "0");
    localStorage.setItem("hh-gainloss", gainLoss);
  }, [dark, gainLoss]);

  const title = TITLES[view] || "Home Hub";
  let screen;
  switch (view) {
    case "portfolio": screen = <PortfolioDashboard />; break;
    case "accounting-dash": screen = <AccountingDash />; break;
    case "accounting": screen = <TransactionList />; break;
    case "transactions": screen = <StockTransactionList />; break;
    case "dividends": screen = <DividendList />; break;
    case "import": screen = <ImportCSV />; break;
    case "inventory":
    case "shopping": screen = <InventoryGrid />; break;
    case "settings": screen = <Settings dark={dark} setDark={setDark} gainLoss={gainLoss} setGainLoss={setGainLoss} />; break;
    default: screen = <Placeholder title={title} />;
  }

  return (
    <div className="hub-layout">
      <Dock active={view} onNav={setView} />
      <div className="hub-main">
        <header className="hub-header"><h1 className="title">{title}</h1></header>
        <main className="hub-page" key={view + dark + gainLoss}>{screen}</main>
      </div>
      <MobileNav active={view} onNav={setView} />
      <TxnDialog open={dialog} onClose={() => setDialog(false)} />
    </div>
  );
}

function Placeholder({ title }) {
  return (
    <div className="empty">
      <i className="pi pi-compass"></i>
      <h4>{title}</h4>
      <p>此畫面在 UI kit 中為示意。核心模組（投資、財務、物資）皆可互動操作。</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
