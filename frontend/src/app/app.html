<div class="hub-layout-wrapper">
  <!-- 桌面端：懸浮側邊欄 -->
  <aside class="hub-dock d-none d-lg-flex">
    <div class="dock-header mb-4">
      <div class="app-logo">
        <i class="pi pi-home"></i>
      </div>
    </div>
    
    <nav class="dock-nav">
      <a class="dock-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" pTooltip="庫存管理" tooltipPosition="right">
        <i class="pi pi-box"></i>
      </a>
      <a class="dock-item" routerLink="/shopping-list" routerLinkActive="active" pTooltip="採買清單" tooltipPosition="right">
        <i class="pi pi-shopping-cart"></i>
      </a>
      <div class="dock-divider"></div>
      <a class="dock-item" routerLink="/portfolio" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" pTooltip="投資概覽" tooltipPosition="right">
        <i class="pi pi-chart-line"></i>
      </a>
      <a class="dock-item sub-item" routerLink="/portfolio/transactions" routerLinkActive="active" pTooltip="股票交易紀錄" tooltipPosition="right">
        <i class="pi pi-list"></i>
      </a>
      <a class="dock-item sub-item" routerLink="/portfolio/dividends" routerLinkActive="active" pTooltip="股利領取紀錄" tooltipPosition="right">
        <i class="pi pi-percentage"></i>
      </a>
      <a class="dock-item sub-item" routerLink="/portfolio/import" routerLinkActive="active" pTooltip="匯入 CSV" tooltipPosition="right">
        <i class="pi pi-upload"></i>
      </a>
      <div class="dock-divider"></div>
      <a class="dock-item sub-item" routerLink="/accounting/dashboard" routerLinkActive="active" pTooltip="記帳分析" tooltipPosition="right">
        <i class="pi pi-chart-pie"></i>
      </a>
      <a class="dock-item" routerLink="/accounting/transactions" routerLinkActive="active" pTooltip="交易紀錄" tooltipPosition="right">
        <i class="pi pi-wallet"></i>
      </a>
      <a class="dock-item sub-item" routerLink="/accounting/settings" routerLinkActive="active" pTooltip="會計設定" tooltipPosition="right">
        <i class="pi pi-cog"></i>
      </a>
    </nav>
  </aside>

  <!-- 主要內容區塊 -->
  <div class="hub-main-content">
    <header class="hub-top-header">
      <div class="header-container px-3 px-lg-4">
        <h1 class="header-title m-0 text-truncate">{{ title() }}</h1>
      </div>
    </header>

    <main class="hub-page-container px-3 px-lg-4 pb-5 pb-lg-4">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- 手機端：整合式底部控制中心 -->
  <div class="hub-mobile-nav-shell d-lg-none glass-effect">
    <!-- 二級導覽 -->
    <div class="hub-sub-nav">
      <div class="segmented-control">
        @if (mainTab() === 'supplies') {
          <button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">庫存</button>
          <button routerLink="/shopping-list" routerLinkActive="active">採買</button>
        }
        @if (mainTab() === 'portfolio') {
          <button routerLink="/portfolio" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">概覽</button>
          <button routerLink="/portfolio/transactions" routerLinkActive="active">交易</button>
          <button routerLink="/portfolio/dividends" routerLinkActive="active">股利</button>
          <button routerLink="/portfolio/import" routerLinkActive="active">匯入</button>
        }
        @if (mainTab() === 'accounting') {
          <button routerLink="/accounting/transactions" routerLinkActive="active">紀錄</button>
          <button routerLink="/accounting/dashboard" routerLinkActive="active">分析</button>
          <button routerLink="/accounting/settings" routerLinkActive="active">管理</button>
        }
      </div>
    </div>

    <!-- 底部主標籤列 -->
    <nav class="hub-bottom-tab-bar">
      <a class="tab-item" [class.active]="mainTab() === 'supplies'" routerLink="/">
        <i class="pi pi-box"></i><span>物資</span>
      </a>
      <a class="tab-item" [class.active]="mainTab() === 'portfolio'" routerLink="/portfolio">
        <i class="pi pi-chart-line"></i><span>投資</span>
      </a>
      <a class="tab-item" [class.active]="mainTab() === 'accounting'" routerLink="/accounting/transactions">
        <i class="pi pi-wallet"></i><span>財務</span>
      </a>
    </nav>
  </div>
</div>
