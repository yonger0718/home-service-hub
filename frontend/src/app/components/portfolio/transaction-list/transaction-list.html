<p-toast></p-toast>
<p-confirmDialog styleClass="hub-dialog-md"></p-confirmDialog>

<div class="page-head justify-content-end">
  <div class="head-actions">
    <app-btn variant="secondary" icon="pi-upload" (click)="clearFilters()">清除篩選</app-btn>
    <app-btn icon="pi-plus" (click)="openNew()">新增交易</app-btn>
  </div>
</div>

<div class="filter-bar">
  <div class="search-wrap">
    <i class="pi pi-search" aria-hidden="true"></i>
    <input
      type="text"
      [ngModel]="searchInput()"
      (ngModelChange)="onSearchInput($event)"
      placeholder="搜尋代碼或名稱" />
  </div>
  <div class="filter-controls">
    <app-seg-toggle
      ariaLabel="買賣篩選"
      [options]="sideFilterOptions"
      [value]="query().side ?? 'ALL'"
      (change)="onSideFilterChange($event)"
    ></app-seg-toggle>
  </div>
</div>

@if (brokerFilterOptions().length > 0) {
  <div class="broker-filter-row">
    <app-seg-toggle
      ariaLabel="券商篩選"
      [options]="brokerFilterOptions()"
      [value]="selectedBroker()"
      (change)="onBrokerFilterChange($event)"
    ></app-seg-toggle>
  </div>
}

<div class="result-meta">
  <span>{{ total() }} 筆</span>
  @if (loading()) {
    <span>查詢中...</span>
  }
</div>

<app-timeline [rows]="timelineRows()"></app-timeline>

@if (!loading() && timelineRows().length === 0) {
  <div class="empty">
    <i class="pi pi-list" aria-hidden="true"></i>
    <h4>無股票交易</h4>
    <p>調整篩選條件或新增一筆交易。</p>
  </div>
}

@if (total() > (query().limit ?? 25)) {
  <p-paginator
    [first]="query().offset ?? 0"
    [rows]="query().limit ?? 25"
    [totalRecords]="total()"
    [rowsPerPageOptions]="rowsPerPageOptions"
    (onPageChange)="onPageChange($event)"
    styleClass="hub-paginator">
  </p-paginator>
}

<p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

<p-dialog
  [header]="isEdit() ? '修改交易' : '新增交易'"
  [(visible)]="showDialog"
  [modal]="true"
  [dismissableMask]="true"
  appendTo="body"
  styleClass="hub-dialog-md portfolio-form-dialog"
  contentStyleClass="portfolio-form-content">
  <div class="row g-2 mt-1 hub-form-grid">
    <div class="col-12 mb-1">
      <label class="d-block mb-1 small fw-bold">交易類型</label>
      <p-selectButton [options]="transactionTypes" [(ngModel)]="newTransaction.type" styleClass="w-100"></p-selectButton>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">市場</label>
      <p-select
        [options]="marketOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="selectedMarket()"
        (ngModelChange)="onMarketChange($event)"
        [fluid]="true"
        appendTo="body">
      </p-select>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">股票代碼</label>
      <input pInputText [(ngModel)]="newTransaction.symbol" placeholder="例如: 2330" class="w-100" />
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">交易日期</label>
      <p-datepicker [(ngModel)]="newTransaction.trade_date" [fluid]="true" appendTo="body" dateFormat="yy-mm-dd"></p-datepicker>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">成交股數</label>
      <p-inputNumber [(ngModel)]="newTransaction.quantity" [min]="0" [fluid]="true"></p-inputNumber>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">成交單價</label>
      <p-inputNumber [(ngModel)]="newTransaction.price" mode="decimal" [minFractionDigits]="1" [fluid]="true"></p-inputNumber>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">手續費</label>
      <p-inputNumber [(ngModel)]="newTransaction.fee" [fluid]="true"></p-inputNumber>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">交易稅</label>
      <p-inputNumber [(ngModel)]="newTransaction.tax" [fluid]="true"></p-inputNumber>
    </div>
    @if (isForeignTrade()) {
      <div class="col-6">
        <label class="d-block mb-1 small fw-bold">幣別</label>
        <input pInputText [(ngModel)]="newTransaction.currency" class="w-100" />
      </div>
      <div class="col-6">
        <label class="d-block mb-1 small fw-bold">匯率 (TWD)</label>
        <p-inputNumber
          [(ngModel)]="newTransaction.fx_rate_to_twd"
          mode="decimal"
          [minFractionDigits]="2"
          [fluid]="true">
        </p-inputNumber>
        @if (showFxRateError()) {
          <div class="field-error">匯率必須大於 0</div>
        }
      </div>
    }
  </div>
  <ng-template pTemplate="footer">
    <app-btn variant="ghost" icon="pi-times" (click)="showDialog.set(false)">取消</app-btn>
    <app-btn (click)="saveTransaction()">儲存交易</app-btn>
  </ng-template>
</p-dialog>
