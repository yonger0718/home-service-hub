<p-card header="公司行動 / 面額變更">
  <ng-container *ngIf="loading(); else loaded">
    <p-skeleton width="100%" height="6rem"></p-skeleton>
  </ng-container>

  <ng-template #loaded>
    <ng-container *ngIf="actions().length > 0; else empty">
      <p-table [value]="actions()" styleClass="p-datatable-sm" responsiveLayout="scroll">
        <ng-template pTemplate="header">
          <tr>
            <th>生效日</th>
            <th>代號</th>
            <th>類型</th>
            <th class="text-right">比例</th>
            <th>來源</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr>
            <td>{{ row.effective_date }}</td>
            <td>{{ row.symbol }}</td>
            <td>
              <p-tag [value]="row.action_type" severity="info"></p-tag>
            </td>
            <td class="text-right">{{ row.ratio }}</td>
            <td>{{ row.source }}</td>
          </tr>
        </ng-template>
      </p-table>
    </ng-container>

    <ng-template #empty>
      <div class="empty-state">尚無資料</div>
    </ng-template>
  </ng-template>
</p-card>
