<p-toast></p-toast>
<p-confirmDialog styleClass="hub-dialog-md"></p-confirmDialog>

<div class="hub-page-header justify-content-end">
  <div class="header-actions">
    <p-button label="新增股利" icon="pi pi-plus" (onClick)="openNew()" styleClass="hub-btn-primary"></p-button>
  </div>
</div>

<div class="hub-modern-list">
  @for (d of dividends(); track d.id) {
    <app-list-item [clickable]="true" (itemClick)="showMenu($event, d)">
      <ng-container left>
        <div class="main-text">{{ nameFor(d.symbol) ?? d.symbol }}</div>
        <div class="sub-text">
          {{ d.symbol }} · {{ d.ex_dividend_date | date:'yyyy-MM-dd' }} 除息
        </div>
      </ng-container>
      <ng-container right>
        <div class="text-end">
          <div class="amount-text dividend-amount">{{ d.amount | currency:'TWD':'symbol':'1.0-0' }}</div>
        </div>
      </ng-container>
    </app-list-item>
  } @empty {
    <div class="empty-state">
      <i class="pi pi-percentage"></i>
      <h4>無股利紀錄</h4>
      <p>尚未記錄任何股利收入。</p>
    </div>
  }
</div>

<p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

<p-dialog
  [header]="isEdit() ? '修改股利' : '新增股利'"
  [(visible)]="showDialog"
  [modal]="true"
  [dismissableMask]="true"
  appendTo="body"
  styleClass="hub-dialog-md portfolio-form-dialog"
  contentStyleClass="portfolio-form-content">
  <div class="row g-2 mt-1 hub-form-grid">
    <div class="col-12">
      <label class="d-block mb-1 small fw-bold">股票代碼</label>
      <input pInputText [(ngModel)]="newDividend.symbol" placeholder="例如: 2330" class="w-100" />
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">股利金額 (TWD，扣除手續費 / 補充保費後)</label>
      <p-inputNumber [(ngModel)]="newDividend.amount" [min]="0" mode="decimal" [fluid]="true"></p-inputNumber>
      @if (grossHint()) {
        <div class="small text-muted mt-1">{{ grossHint() }}</div>
      }
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">除息日期</label>
      <p-datepicker [(ngModel)]="newDividend.ex_dividend_date" [fluid]="true" appendTo="body" dateFormat="yy-mm-dd"></p-datepicker>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">手續費</label>
      <p-inputNumber [(ngModel)]="newDividend.fee" [min]="0" mode="decimal" [fluid]="true"></p-inputNumber>
    </div>
    <div class="col-6">
      <label class="d-block mb-1 small fw-bold">補充保費 (二代健保)</label>
      <p-inputNumber [(ngModel)]="newDividend.tax" [min]="0" mode="decimal" [fluid]="true"></p-inputNumber>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="取消" icon="pi pi-times" [text]="true" (onClick)="showDialog.set(false)"></p-button>
    <p-button label="儲存股利" (onClick)="saveDividend()" styleClass="hub-btn-primary"></p-button>
  </ng-template>
</p-dialog>
