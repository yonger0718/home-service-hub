<p-card styleClass="networth-card">
  <div class="networth-header">
    <h3 class="card-title">資產淨值走勢</h3>
    <p-selectButton
      [options]="windowOptions"
      optionLabel="label"
      optionValue="value"
      [allowEmpty]="false"
      [ngModel]="selectedWindow()"
      (ngModelChange)="onWindowChange($event)">
    </p-selectButton>
  </div>

  @if (loading()) {
    <div class="networth-loading">
      <p-skeleton width="100%" height="18rem"></p-skeleton>
    </div>
  } @else if (points().length === 0) {
    <div class="networth-empty">尚無資料</div>
  } @else {
    <div class="networth-chart">
      <p-chart type="line" [data]="chartData()" [options]="chartOptions"></p-chart>
    </div>
  }
</p-card>
